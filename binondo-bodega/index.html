<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Binondo Bodega Furniture — Honest furniture for everyday living</title>
<meta name="description" content="Modern, Scandinavian-inspired furniture for living rooms, bedrooms, offices, and dining. Shop sofas, beds, tables, chairs and more." />
<link rel="stylesheet" href="css/styles.css" />
<script>const PAGE_ACTIVE="home";</script>
</head>
<body>
<div id="navbar"></div>

<main>
  <section class="hero">
    <div class="container hero-grid">
      <div>
        <span class="eyebrow fade-up">New Spring Collection</span>
        <h1 class="fade-up">Furniture made to live with, not just look at.</h1>
        <p class="fade-up-2">Quietly modern pieces in solid oak, soft linens, and honest forms. Designed in the bodega, built to last in your home.</p>
        <div class="hero-actions fade-up-3">
          <a href="pages/shop.html" class="btn btn-primary">Shop the collection</a>
          <a href="pages/shop.html?cat=Living%20Room" class="btn btn-outline">Browse Living Room</a>
        </div>
      </div>
      <div class="hero-img fade-up-2">
        <img src="images/hero-living.jpg" alt="Scandinavian living room" />
      </div>
    </div>
  </section>

  <section class="categories">
    <div class="container">
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <h2>Featured pieces</h2>
          <p>Hand-picked favourites from this season.</p>
        </div>
        <a href="pages/shop.html" class="btn btn-outline">View all</a>
      </div>
      <div class="product-grid" id="featured"></div>
    </div>
  </section>
</main>

<div id="footer"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  $("#cat-grid").innerHTML = CATEGORIES.map(c => `
    <a class="cat-card fade-up" href="pages/shop.html?cat=${encodeURIComponent(c.name)}">
      <div class="icon">${c.icon}</div>
      <h4>${c.name}</h4>
    </a>`).join("");
  $("#featured").innerHTML = PRODUCTS.slice(0, 4).map(productCard).join("");
</script>
</body>
</html>
