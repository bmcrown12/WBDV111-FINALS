<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin Dashboard — Binondo Bodega Furniture</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div id="navbar"></div>
<main class="dash-layout">
  <aside class="dash-sidebar">
    <h4>Admin</h4>
    <a class="active">Overview</a>
    <a>Products</a>
    <a>Orders</a>
    <a>Customers</a>
    <a>Inventory</a>
    <a onclick="logout()" style="color:var(--danger);margin-top:1rem;cursor:pointer">Sign out</a>
  </aside>
  <section class="dash-main" id="main"></section>
</main>
<div id="footer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
const u = getUser();
if (!u || (u.role !== "admin" && u.role !== "superadmin")) location.href = "login.html";

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const sales = [12,18,15,22,28,30,26,34,38,42,40,48];
const max = Math.max(...sales);

const sampleOrders = [
  { id:"ORD-204881", customer:"Anna Reyes", item:"Søren 3-Seater Sofa", total:899, status:"Shipped" },
  { id:"ORD-204880", customer:"Marco Santos", item:"Björk Coffee Table", total:329, status:"Processing" },
  { id:"ORD-204879", customer:"Lia Tan", item:"Malm Platform Bed", total:749, status:"Delivered" },
  { id:"ORD-204878", customer:"Diego Cruz", item:"Arne Writing Desk", total:389, status:"Processing" },
  { id:"ORD-204877", customer:"Sofia Lee", item:"Luna Lounge Armchair", total:449, status:"Shipped" },
];
const tagFor = s => s==="Delivered"?"green":s==="Shipped"?"amber":"gray";

$("#main").innerHTML = `
  <h1>Admin overview</h1>
  <p class="lead">Welcome back, ${u?.name||"Admin"} — here's how the store is doing.</p>

  <div class="stat-grid">
    <div class="stat"><div class="label">Revenue (mo)</div><div class="value">$48,210</div><div class="delta">+12.4%</div></div>
    <div class="stat"><div class="label">Orders</div><div class="value">312</div><div class="delta">+8.1%</div></div>
    <div class="stat"><div class="label">New customers</div><div class="value">94</div><div class="delta">+5.7%</div></div>
    <div class="stat"><div class="label">Avg order</div><div class="value">$486</div><div class="delta">+3.2%</div></div>
  </div>

  <div class="panel">
    <h3>Sales — last 12 months</h3>
    <div class="bars">
      ${sales.map((v,i)=>`<div class="bar" style="height:${(v/max)*100}%"><span>${months[i]}</span></div>`).join("")}
    </div>
  </div>

  <div class="panel">
    <h3>Recent orders</h3>
    <table>
      <thead><tr><th>Order</th><th>Customer</th><th>Item</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>${sampleOrders.map(o=>`
        <tr><td>${o.id}</td><td>${o.customer}</td><td>${o.item}</td><td>${money(o.total)}</td><td><span class="tag ${tagFor(o.status)}">${o.status}</span></td></tr>
      `).join("")}</tbody>
    </table>
  </div>

  <div class="panel">
    <h3>Inventory</h3>
    <table>
      <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead>
      <tbody>${PRODUCTS.map(p=>`
        <tr>
          <td style="display:flex;align-items:center;gap:.6rem"><img src="../${p.image}" style="width:36px;height:36px;border-radius:6px;object-fit:cover">${p.name}</td>
          <td>${p.category}</td>
          <td>${money(p.price)}</td>
          <td><span class="tag ${p.stock<10?'amber':'green'}">${p.stock} units</span></td>
          <td><button class="btn btn-outline" style="padding:.4rem .9rem;font-size:.82rem">Edit</button></td>
        </tr>`).join("")}</tbody>
    </table>
  </div>
`;
</script>
</body>
</html>
