<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cart — Binondo Bodega Furniture</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div id="navbar"></div>

<main class="container">
  <h1 style="padding:2.5rem 0 .5rem">Your cart</h1>
  <div id="cart-root"></div>
</main>

<div id="footer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
function render() {
  const items = getCart();
  if (!items.length) {
    $("#cart-root").innerHTML = `
      <div class="empty">
        <h3>Your cart is empty</h3>
        <p>Pieces you love will appear here.</p>
        <a href="shop.html" class="btn btn-primary" style="margin-top:1rem">Browse furniture</a>
      </div>`;
    return;
  }
  const subtotal = cartSubtotal();
  const shipping = subtotal > 500 ? 0 : 49;
  const total = subtotal + shipping;
  $("#cart-root").innerHTML = `
  <div class="cart-layout">
    <div class="cart-list">
      ${items.map(i => {
        const p = PRODUCTS.find(x=>x.id===i.id); if(!p) return "";
        return `
        <div class="cart-item">
          <img src="../${p.image}" alt="${p.name}" />
          <div>
            <div class="name">${p.name}</div>
            <div class="meta">${p.category} · ${p.material}</div>
            <div class="qty-stepper" style="margin-top:.5rem">
              <button onclick="setQty('${p.id}',${i.qty-1});render()">−</button>
              <span>${i.qty}</span>
              <button onclick="setQty('${p.id}',${i.qty+1});render()">+</button>
            </div>
            <button class="remove" onclick="removeFromCart('${p.id}');render()">Remove</button>
          </div>
          <div style="text-align:right;font-weight:600">${money(p.price * i.qty)}</div>
        </div>`;
      }).join("")}
    </div>
    <aside class="summary">
      <h3>Order summary</h3>
      <div class="summary-row"><span>Subtotal</span><span>${money(subtotal)}</span></div>
      <div class="summary-row"><span>Shipping</span><span>${shipping===0?"Free":money(shipping)}</span></div>
      <div class="summary-row total"><span>Total</span><span>${money(total)}</span></div>
      <button class="btn btn-primary btn-block" style="margin-top:1rem" onclick="checkout()">Checkout</button>
      <a href="shop.html" class="btn btn-outline btn-block" style="margin-top:.5rem">Continue shopping</a>
      <p style="font-size:.78rem;color:var(--muted);margin-top:1rem;text-align:center">Free shipping on orders over $500.</p>
    </aside>
  </div>`;
}
function checkout() {
  const u = getUser();
  if (!u) { toast("Please sign in to check out"); setTimeout(()=>location.href="login.html?next=cart", 700); return; }
  // Simulated order
  const orders = JSON.parse(localStorage.getItem("bb-orders")||"[]");
  orders.unshift({ id: "ORD-"+Date.now().toString().slice(-6), date: new Date().toISOString(), items: getCart(), total: cartSubtotal() + (cartSubtotal()>500?0:49), status: "Processing", user: u.email });
  localStorage.setItem("bb-orders", JSON.stringify(orders));
  setCart([]);
  toast("Order placed!");
  setTimeout(()=>location.href="account.html", 800);
}
render();
</script>
</body>
</html>
