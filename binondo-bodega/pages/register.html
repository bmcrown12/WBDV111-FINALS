<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Create account — Binondo Bodega Furniture</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div id="navbar"></div>
<main class="auth-wrap">
  <div class="auth-card fade-up">
    <h2>Create your account</h2>
    <p class="sub">It only takes a minute.</p>
    <form onsubmit="event.preventDefault(); doRegister();">
      <div class="field"><label>Full name</label><input id="name" required /></div>
      <div class="field"><label>Email</label><input id="email" type="email" required /></div>
      <div class="field"><label>Password</label><input id="password" type="password" required minlength="6" /></div>
      <button class="btn btn-primary btn-block" type="submit">Create account</button>
    </form>
    <p style="text-align:center;font-size:.85rem;margin-top:1.25rem;color:var(--muted)">
      Already have an account? <a href="login.html" style="color:var(--accent-dark);font-weight:500">Sign in</a>
    </p>
  </div>
</main>
<div id="footer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
function doRegister(){
  setUser({ email: $("#email").value, name: $("#name").value, role: "user" });
  toast("Account created");
  setTimeout(()=>location.href="account.html", 600);
}
</script>
</body>
</html>
