<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Super Admin — Binondo Bodega Furniture</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div id="navbar"></div>
<main class="dash-layout">
  <aside class="dash-sidebar">
    <h4>Super Admin</h4>
    <a class="active">Overview</a>
    <a>Staff & roles</a>
    <a>All users</a>
    <a>System settings</a>
    <a>Audit log</a>
    <a onclick="logout()" style="color:var(--danger);margin-top:1rem;cursor:pointer">Sign out</a>
  </aside>
  <section class="dash-main" id="main"></section>
</main>
<div id="footer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
const u = getUser();
if (!u || u.role !== "superadmin") location.href = "login.html";

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const rev = [32,38,41,46,52,58,55,64,70,75,72,82];
const max = Math.max(...rev);
const staff = [
  { name:"Maria Cruz", email:"admin@demo.com", role:"admin", status:"Active" },
  { name:"Pedro Lim", email:"pedro@demo.com", role:"admin", status:"Active" },
  { name:"Ines Garcia", email:"ines@demo.com", role:"staff", status:"Inactive" },
  { name:"Tomas Rivera", email:"tomas@demo.com", role:"staff", status:"Active" },
];

$("#main").innerHTML = `
  <h1>System overview</h1>
  <p class="lead">Full system control — ${u?.name||"Super Admin"}</p>

  <div class="stat-grid">
    <div class="stat"><div class="label">Total revenue</div><div class="value">$684,920</div><div class="delta">+18.6% YoY</div></div>
    <div class="stat"><div class="label">Active users</div><div class="value">12,408</div><div class="delta">+9.1%</div></div>
    <div class="stat"><div class="label">Staff accounts</div><div class="value">${staff.length}</div></div>
    <div class="stat"><div class="label">System uptime</div><div class="value" style="color:#2e8b57">99.98%</div></div>
  </div>

  <div class="panel">
    <h3>Revenue — 12 months</h3>
    <div class="bars">
      ${rev.map((v,i)=>`<div class="bar" style="height:${(v/max)*100}%"><span>${months[i]}</span></div>`).join("")}
    </div>
  </div>

  <div class="panel">
    <h3>Staff & roles</h3>
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th></th></tr></thead>
      <tbody>${staff.map(s=>`
        <tr>
          <td>${s.name}</td><td>${s.email}</td>
          <td><span class="tag gray">${s.role}</span></td>
          <td><span class="tag ${s.status==='Active'?'green':'amber'}">${s.status}</span></td>
          <td style="display:flex;gap:.4rem">
            <button class="btn btn-outline" style="padding:.4rem .8rem;font-size:.78rem">Edit</button>
            <button class="btn btn-outline" style="padding:.4rem .8rem;font-size:.78rem;color:var(--danger)">${s.status==='Active'?'Deactivate':'Activate'}</button>
          </td>
        </tr>`).join("")}</tbody>
    </table>
    <button class="btn btn-primary" style="margin-top:1rem">+ Add staff member</button>
  </div>

  <div class="panel">
    <h3>System settings</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <label class="field" style="margin:0"><label>Store name</label><input value="Binondo Bodega Furniture" /></label>
      <label class="field" style="margin:0"><label>Currency</label><select><option>USD ($)</option><option>EUR (€)</option><option>PHP (₱)</option></select></label>
      <label class="field" style="margin:0"><label>Free shipping threshold</label><input value="500" /></label>
      <label class="field" style="margin:0"><label>Maintenance mode</label><select><option>Off</option><option>On</option></select></label>
    </div>
    <button class="btn btn-primary" style="margin-top:1rem" onclick="toast('Settings saved')">Save settings</button>
  </div>
`;
</script>
</body>
</html>
