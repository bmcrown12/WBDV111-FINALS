<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Account — Binondo Bodega Furniture</title>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div id="navbar"></div>
<main class="dash-layout">
  <aside class="dash-sidebar">
    <h4>Account</h4>
    <a class="active">Overview</a>
    <a>Orders</a>
    <a>Wishlist</a>
    <a>Addresses</a>
    <a>Profile</a>
    <a onclick="logout()" style="color:var(--danger);margin-top:1rem;cursor:pointer">Sign out</a>
  </aside>
  <section class="dash-main" id="main"></section>
</main>
<div id="footer"></div>
<script src="../js/data.js"></script>
<script src="../js/app.js"></script>
<script>
const u = getUser();
if (!u) location.href = "login.html";
const orders = JSON.parse(localStorage.getItem("bb-orders")||"[]").filter(o=>o.user===u?.email);

$("#main").innerHTML = `
  <h1>Welcome, ${u?.name||"Friend"}</h1>
  <p class="lead">Here's a quick look at your account.</p>

  <div class="stat-grid">
    <div class="stat"><div class="label">Orders</div><div class="value">${orders.length}</div></div>
    <div class="stat"><div class="label">Wishlist</div><div class="value">3</div></div>
    <div class="stat"><div class="label">Reward points</div><div class="value">120</div></div>
    <div class="stat"><div class="label">Member since</div><div class="value" style="font-size:1.2rem">2026</div></div>
  </div>

  <div class="panel">
    <h3>Recent orders</h3>
    ${orders.length ? `
    <table>
      <thead><tr><th>Order</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>${orders.map(o=>`
        <tr>
          <td>${o.id}</td>
          <td>${new Date(o.date).toLocaleDateString()}</td>
          <td>${o.items.reduce((s,i)=>s+i.qty,0)}</td>
          <td>${money(o.total)}</td>
          <td><span class="tag amber">${o.status}</span></td>
        </tr>`).join("")}</tbody>
    </table>` : `<p style="color:var(--muted)">No orders yet. <a href="shop.html" style="color:var(--accent-dark)">Start shopping →</a></p>`}
  </div>

  <div class="panel">
    <h3>Profile</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;font-size:.92rem">
      <div><div style="color:var(--muted);font-size:.8rem;text-transform:uppercase">Name</div>${u?.name||""}</div>
      <div><div style="color:var(--muted);font-size:.8rem;text-transform:uppercase">Email</div>${u?.email||""}</div>
    </div>
  </div>
`;
</script>
</body>
</html>
